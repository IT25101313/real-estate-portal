<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property | LuxeRealEstate</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .section-title {
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-size: 1.2rem;
            color: #a5b4fc;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <nav>
        <h1>LuxeRealEstate</h1>
        <div class="nav-links">
            <a href="viewProperties.html">View Properties</a>
            <a href="addProperty.html" class="active">Add Property</a>
            <a href="deleteProperty.html">Delete Property</a>
        </div>
    </nav>

    <div class="container">
        <h2>List a New Property</h2>
        <form id="addForm" action="AddPropertyServlet" method="post">
            <div class="section-title">Property Details</div>
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="e.g. Modern Villa" required>
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="e.g. Beverly Hills, CA" required>
            </div>
            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" step="0.01" min="0.01" id="price" name="price" placeholder="e.g. 1500000" required>
            </div>

            <div class="section-title">Agent Details</div>
            <div class="form-group">
                <label for="agentName">Agent Name</label>
                <input type="text" id="agentName" name="agentName" placeholder="e.g. John Doe" required>
            </div>
            <div class="form-group">
                <label for="phoneNumber">Phone Number</label>
                <input type="text" id="phoneNumber" name="phoneNumber" placeholder="e.g. 1234567890" pattern="\d{10}" title="Phone number must be exactly 10 digits" required>
            </div>
            <div class="form-group">
                <label for="agencyName">Agency Name</label>
                <input type="text" id="agencyName" name="agencyName" placeholder="e.g. Luxe Estates LLC" required>
            </div>
            <div class="form-group">
                <label for="licenseNumber">License Number</label>
                <input type="text" id="licenseNumber" name="licenseNumber" placeholder="e.g. AG-7890" required>
            </div>

            <button type="submit" style="margin-top: 1rem;">Publish Listing</button>
        </form>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
