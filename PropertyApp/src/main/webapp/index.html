<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | LuxeRealEstate</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            animation: fadeIn 0.8s ease-out forwards;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-bottom: 3rem;
        }
        .action-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .action-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        .action-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-color);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .action-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #a5b4fc;
        }
    </style>
</head>
<body>
    <nav>
        <h1>LuxeRealEstate</h1>
        <div class="nav-links">
            <a href="viewProperties.html">View Properties</a>
            <a href="addProperty.html">Add Property</a>
            <a href="deleteProperty.html">Delete Property</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Welcome to LuxeRealEstate</h1>
        <p>Premium property management system for modern agents.</p>

        <div class="action-cards">
            <a href="viewProperties.html" class="action-card">
                <h3 style="font-size: 2.5rem; margin-bottom: 0.5rem;">🏠</h3>
                <h3>View Listings</h3>
                <p>Browse through all available high-end real estate properties.</p>
            </a>
            <a href="addProperty.html" class="action-card">
                <h3 style="font-size: 2.5rem; margin-bottom: 0.5rem;">➕</h3>
                <h3>Add Property</h3>
                <p>List a new property to our exclusive management system.</p>
            </a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
